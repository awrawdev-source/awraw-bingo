<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awraw Bingo</title>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
    margin:0;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

.bingo-board{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
    margin:20px 0;
}

.bingo-board button{
    height:50px;
    font-size:16px;
    padding:0;
}

button{
    background:#00c853;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.free{
    background:#ff9800 !important;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🎲 Awraw Bingo</h1>

<div class="card">

<h2>Balance: 0 ETB</h2>

<p>Welcome to @awraw_bingo_bot</p>

<div class="bingo-board">
<button>1</button>
<button>2</button>
<button>3</button>
<button>4</button>
<button>5</button>

<button>6</button>
<button>7</button>
<button>8</button>
<button>9</button>
<button>10</button>

<button>11</button>
<button>12</button>
<button class="free">FREE</button>
<button>13</button>
<button>14</button>

<button>15</button>
<button>16</button>
<button>17</button>
<button>18</button>
<button>19</button>

<button>20</button>
<button>21</button>
<button>22</button>
<button>23</button>
<button>24</button>
</div>

<button>Play Now</button>

</div>

</body>
</html
